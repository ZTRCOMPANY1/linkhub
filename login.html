<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LinkHub Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page auth-page">
    <div class="auth-grid">
      <div class="panel">
        <h2>Criar conta</h2>
        <input id="registerUsername" class="input" placeholder="Nome de usuário">
        <input id="registerPassword" class="input" type="password" placeholder="Senha">
        <button class="btn primary-btn" onclick="register()">Criar conta</button>
        <p id="registerMessage" class="message"></p>
      </div>

      <div class="panel">
        <h2>Entrar</h2>
        <input id="loginUsername" class="input" placeholder="Nome de usuário">
        <input id="loginPassword" class="input" type="password" placeholder="Senha">
        <button class="btn primary-btn" onclick="login()">Entrar</button>
        <p id="loginMessage" class="message"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
